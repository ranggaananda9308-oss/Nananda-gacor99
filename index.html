<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRAGMATIC PLAY - VIRTUAL SERVER</title>
    <style>
        :root { --gold: #ffd700; --dark: #0a0a0a; --green: #00ff88; }
        body { background: var(--dark); color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid #222; }
        .slot-box { background: linear-gradient(180deg, #1a1a1a, #000); margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .reels { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .reel { background: #000; width: 75px; height: 95px; display: flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid #444; font-size: 3rem; }
        .btn-spin { background: linear-gradient(180deg, var(--gold), #8a6d00); border: none; padding: 18px; width: 100%; border-radius: 50px; font-weight: bold; font-size: 1.2rem; cursor: pointer; color: black; box-shadow: 0 5px 0 #4d3d00; }
        .btn-spin:active { transform: translateY(3px); box-shadow: 0 2px 0 #4d3d00; }
        #status-sync { font-size: 0.5rem; color: #111; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div style="color:var(--gold); font-weight:bold; letter-spacing:2px;">PRAGMATIC VIRTUAL</div>
</div>

<div class="slot-box">
    <div style="background:#000; padding:10px; border-radius:10px; margin-bottom:15px; border: 1px solid #222;">
        <div style="font-size:0.6rem; color:#555;">SALDO VIRTUAL</div>
        <div style="color:var(--green); font-size:1.3rem; font-weight:bold;">Rp <span id="saldo">50,000</span></div>
    </div>

    <div class="reels">
        <div class="reel" id="r1">⚡</div>
        <div class="reel" id="r2">⚡</div>
        <div class="reel" id="r3">⚡</div>
    </div>

    <button class="btn-spin" onclick="spin()">SPIN SEKARANG</button>
</div>

<div id="status-sync">CONNECTING...</div>

<script>
    // LINK RAW GITHUB LO SUDAH TERPASANG
    const REMOTE_URL = "https://raw.githubusercontent.com/ranggaananda9308-oss/remote.txt/main/control.txt"; 

    let saldo = 50000;
    let mode = "RUNGKAT";
    const items = ["🍒", "💎", "🔔", "7️⃣", "🍋"];

    // Fungsi cek remote tiap 5 detik
    async function updateRemote() {
        try {
            const res = await fetch(REMOTE_URL + '?t=' + Date.now());
            const text = await res.text();
            mode = text.trim().toUpperCase();
            document.getElementById('status-sync').innerText = "SERVER_STAT_" + mode;
        } catch(e) { document.getElementById('status-sync').innerText = "OFFLINE"; }
    }
    setInterval(updateRemote, 5000);

    function spin() {
        if(saldo < 5000) return alert("Saldo Habis!");
        saldo -= 5000;

        let s1, s2, s3;
        if(mode === 'GACOR') {
            s1 = s2 = s3 = items[Math.floor(Math.random()*items.length)];
            saldo += 75000;
        } else if(mode === 'RUNGKAD') {
            s1 = items[0]; s2 = items[2]; s3 = items[4];
        } else {
            s1 = items[Math.floor(Math.random()*items.length)];
            s2 = items[Math.floor(Math.random()*items.length)];
            s3 = items[Math.floor(Math.random()*items.length)];
            if(s1==s2 && s2==s3) saldo += 100000;
        }

        document.getElementById('r1').innerText = s1;
        document.getElementById('r2').innerText = s2;
        document.getElementById('r3').innerText = s3;
        document.getElementById('saldo').innerText = saldo.toLocaleString();
    }
</script>
</body>
</html>
